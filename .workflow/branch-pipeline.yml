version: '1.0'
name: android-build-branch
displayName: Android APK 构建 (分支)
stages:
  - stage:
    name: build
    displayName: 编译APK
    strategy: naturally
    trigger: auto
    steps:
      - step: build@gradle
        name: build_apk
        displayName: Gradle 构建 APK
        jdkVersion: 17
        gradleVersion: 4.4
        commands:
          - chmod +x ./gradlew
          - ./gradlew assembleDebug --no-daemon --stacktrace
        artifacts:
          - name: APK_ARTIFACT
            path:
              - ./app/build/outputs/apk/debug
      - step: publish@general_artifacts
        name: publish_apk
        displayName: 上传APK制品
        dependArtifact: APK_ARTIFACT
        artifactName: radio-apk
        dependsOn: build_apk
triggers:
  push:
    branches:
      prefix:
        - ""
