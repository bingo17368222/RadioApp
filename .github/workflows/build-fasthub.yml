name: Build FastHub APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout FastHub
        uses: actions/checkout@v4
        with:
          repository: k0shk0sh/FastHub
          ref: 4.7.3

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Show Build Errors
        if: failure()
        run: |
          echo "=== BUILD LOG (last 200 lines) ==="
          tail -200 build.log || true
          echo "=== ERROR SUMMARY ==="
          grep -n "error:" build.log | head -30 || true

      - name: Verify APK
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" -type f -exec ls -la {} \;
          echo "=== Copy APK ==="
          mkdir -p /tmp/apk
          find . -name "*.apk" -type f -exec cp {} /tmp/apk/ \;
          ls -la /tmp/apk/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fasthub-debug-latest
          name: "FastHub Debug Build v${{ github.run_number }}"
          body: "Auto-generated FastHub debug APK v${{ github.run_number }}"
          files: /tmp/apk/*.apk
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
