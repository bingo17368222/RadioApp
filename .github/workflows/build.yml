name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download Gradle from mirror (fallback)
        run: |
          # Try to pre-download Gradle from mirror to avoid connection issues
          GRADLE_VERSION=7.5
          GRADLE_ZIP=gradle-${GRADLE_VERSION}-bin.zip
          GRADLE_DIST_DIR=~/.gradle/wrapper/dists/gradle-${GRADLE_VERSION}-bin
          mkdir -p "$GRADLE_DIST_DIR"
          # Try Tencent mirror first, then official
          for URL in \
            "https://mirrors.cloud.tencent.com/gradle/${GRADLE_ZIP}" \
            "https://services.gradle.org/distributions/${GRADLE_ZIP}"; do
            echo "Trying: $URL"
            if curl -fSL -o /tmp/${GRADLE_ZIP} "$URL" 2>&1; then
              echo "Downloaded from: $URL"
              # Compute hash dir (gradle wrapper uses a hash of the URL)
              HASH=$(echo -n "$URL" | md5sum | cut -d' ' -f1)
              TARGET_DIR="${GRADLE_DIST_DIR}/${HASH}"
              mkdir -p "$TARGET_DIR"
              cp /tmp/${GRADLE_ZIP} "$TARGET_DIR/${GRADLE_ZIP}"
              cd "$TARGET_DIR"
              unzip -q ${GRADLE_ZIP}
              echo "Gradle installed to $TARGET_DIR"
              break
            fi
          done

      - name: Build Debug APK
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Show Build Log
        if: always() && !cancelled()
        run: |
          echo "=== BUILD LOG (last 300 lines) ==="
          tail -300 build.log || true
          echo "=== ERROR SUMMARY ==="
          grep -in "error" build.log | head -50 || true

      - name: Debug APK location
        if: always() && !cancelled()
        run: |
          echo "=== Listing APK outputs ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found"
          echo "=== Listing build directory ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk directory"
          echo "=== Checking debug directory ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug directory"

      - name: Upload Build Log
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: radio-app-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "Debug Build v${{ github.run_number }}"
          body: "Auto-generated debug APK v${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
