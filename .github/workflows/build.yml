name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.0'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew

      - name: Clean and Build Debug APK
        run: ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log && if [ ${PIPESTATUS[0]} -ne 0 ]; then echo "=== BUILD FAILED ===" && tail -200 build.log; fi

      - name: Verify APK
        if: success()
        run: |
          echo "=== APK Output Directory ==="
          ls -la app/build/outputs/apk/debug/ || echo "APK directory not found"
          echo "=== All APK files ==="
          find app/build -name "*.apk" -type f
          echo "=== APK Info ==="
          $ANDROID_HOME/build-tools/34.0.0/aapt dump badging app/build/outputs/apk/debug/*.apk 2>/dev/null | grep -E "package|version" | head -3 || echo "aapt not available"

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: radio-app-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Rename APK with version
        if: success()
        run: |
          mkdir -p apk-release
          cp app/build/outputs/apk/debug/app-debug.apk apk-release/radio-app-v1.1-${{ github.run_number }}.apk
          ls -la apk-release/

      - name: Upload to GitHub Release
        if: success() && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "Debug Build v${{ github.run_number }}"
          body: "Auto-generated debug APK v${{ github.run_number }} from commit ${{ github.sha }}"
          files: apk-release/*.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
