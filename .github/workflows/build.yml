name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # v2.4.43: Include C/C++ source files in cache key.
          # Previous key only had *.gradle* files, so C++ changes
          # (flash_attn, threads, chat template) were NEVER recompiled.
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/*.c', '**/*.cpp', '**/*.h', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        run: |
          # GitHub ubuntu-latest already has Android SDK at /usr/local/lib/android/sdk
          # We just need to ensure ANDROID_HOME points to it and install missing components
          export ANDROID_HOME="/usr/local/lib/android/sdk"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          echo "=== Android SDK location ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la "$ANDROID_HOME" || true

          # Accept licenses
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

          # Install required components if missing
          sdkmanager "platforms;android-33" "build-tools;33.0.0" "ndk;25.1.8937393" || true

          echo "=== Installed SDK components ==="
          sdkmanager --list_installed | head -30 || true

      - name: Install Gradle (Tencent mirror)
        run: |
          # Remove local proxy settings that don't work on CI
          sed -i '/systemProp\.http\.proxy/d; /systemProp\.https\.proxy/d' gradle.properties
          echo "=== gradle.properties ==="
          cat gradle.properties

          # Download Gradle using curl (Java's HttpsURLConnection has connection issues on CI)
          GRADLE_VERSION=7.5
          if [ ! -d "/tmp/gradle-${GRADLE_VERSION}" ]; then
            curl -fSL -o /tmp/gradle.zip "https://mirrors.cloud.tencent.com/gradle/gradle-${GRADLE_VERSION}-bin.zip"
            unzip -q /tmp/gradle.zip -d /tmp/
          fi
          export PATH="/tmp/gradle-${GRADLE_VERSION}/bin:$PATH"
          echo "/tmp/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH
          gradle --version

      - name: Build Debug APK
        run: |
          set -o pipefail
          export PATH="/tmp/gradle-7.5/bin:$PATH"
          # v2.4.45: Force NDK/CMake full rebuild.
          # Previous attempts (rm -rf .cxx, gradle clean) were insufficient because
          # Gradle's build cache was restoring the old .so output.
          # --no-build-cache disables the Gradle build cache.
          # --rerun-tasks forces all tasks to re-run (ignores up-to-date checks).
          # touch updates timestamps so CMake detects source changes.
          find app/src/main/cpp -name "*.c" -o -name "*.cpp" -o -name "*.h" | xargs touch 2>/dev/null || true
          rm -rf app/.cxx app/build/.cxx app/build/intermediates/cxx app/build/intermediates/merged_native_libs
          gradle clean assembleDebug --no-daemon --no-build-cache --rerun-tasks --stacktrace 2>&1 | tee build.log

      - name: Show Build Log
        if: always() && !cancelled()
        run: |
          echo "=== BUILD LOG (last 300 lines) ==="
          tail -300 build.log || true
          echo "=== ERROR SUMMARY ==="
          grep -in "error" build.log | head -50 || true

      - name: Debug APK location
        if: always() && !cancelled()
        run: |
          echo "=== Listing APK outputs ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found"
          echo "=== Listing build directory ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk directory"
          echo "=== Checking debug directory ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug directory"

      - name: Upload Build Log
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*versionName "\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RadioApp-v${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/debug/RadioApp-v*.apk
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "RadioApp v${{ steps.version.outputs.version }}"
          body: "Auto-generated debug APK v${{ steps.version.outputs.version }}"
          files: app/build/outputs/apk/debug/RadioApp-v*.apk
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
