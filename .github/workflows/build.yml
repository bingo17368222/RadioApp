name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.0'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log && if [ ${PIPESTATUS[0]} -ne 0 ]; then echo "=== BUILD FAILED ===" && tail -200 build.log; fi

      - name: Get APK info
        if: success()
        id: apk
        run: |
          APK_PATH=$(find app/build -name "*.apk" -type f | head -1)
          APK_NAME=$(basename "$APK_PATH")
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Upload Release
        if: success() && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH="${{ steps.apk.outputs.apk_path }}"
          BUILD_NUM=${{ github.run_number }}
          
          # Create or get release
          RELEASE_DATA=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"debug-latest\",\"name\":\"Debug Build v${BUILD_NUM}\",\"body\":\"APK build ${BUILD_NUM}\",\"prerelease\":true}" \
            "https://api.github.com/repos/${{ github.repository }}/releases" 2>/dev/null || \
            curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${{ github.repository }}/releases/tags/debug-latest")
          
          UPLOAD_URL=$(echo "$RELEASE_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('upload_url','').replace('{?name,label}',''))")
          echo "Upload URL: $UPLOAD_URL"
          
          # Upload APK
          curl -v -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@$APK_PATH" \
            "${UPLOAD_URL}?name=radio-app-v1.1-${BUILD_NUM}.apk" 2>&1
