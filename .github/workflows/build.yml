name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Show Build Errors
        if: failure()
        run: |
          echo "=== BUILD LOG (last 200 lines) ==="
          tail -200 build.log || true
          echo "=== ERROR SUMMARY ==="
          grep -n "error:" build.log | head -30 || true

      - name: Verify APK
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" -type f -exec ls -la {} \;

      - name: Upload APK Artifact
        shell: bash
        run: |
          set +e
          echo "=== Searching APK ==="
          find . -name "*.apk" -type f 2>/dev/null || true
          echo "=== Build dir ==="
          ls -la app/build/ 2>/dev/null || true
          ls -la app/build/outputs/ 2>/dev/null || true
          ls -la app/build/outputs/apk/ 2>/dev/null || true
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || true
          set -e
          APK_FILE=$(find . -name "app-debug.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          echo "Found APK: $APK_FILE"
          mkdir -p /tmp/apk-upload
          cp "$APK_FILE" /tmp/apk-upload/app-debug.apk

      - name: Upload APK to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: radio-app-apk
          path: /tmp/apk-upload/
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "Debug Build v${{ github.run_number }}"
          body: "Auto-generated debug APK v${{ github.run_number }}"
          files: /tmp/apk-upload/*.apk
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
