name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.0'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          BUILD_STATUS=${PIPESTATUS[0]}
          echo ""
          echo "=== Build exit code: $BUILD_STATUS ==="
          echo "=== Searching for APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Done searching ==="
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            tail -200 build.log
            exit 1
          fi

      - name: Prepare APK for release
        if: success()
        run: |
          mkdir -p apk-release
          APK_FILE=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" "apk-release/radio-app-v1.1-${{ github.run_number }}.apk"
            echo "APK prepared: apk-release/radio-app-v1.1-${{ github.run_number }}.apk"
            ls -la apk-release/
          else
            echo "WARNING: No APK found, listing all files:"
            find . -type f | grep -i apk || echo "No .apk files anywhere"
            ls -la app/build/ 2>/dev/null || true
            exit 1
          fi

      - name: Upload to GitHub Release
        if: success() && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "Debug Build v${{ github.run_number }}"
          body: "Auto-generated debug APK v${{ github.run_number }} from commit ${{ github.sha }}"
          files: apk-release/*.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
