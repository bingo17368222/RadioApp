name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Gradle and remove local proxy
        run: |
          # Remove local proxy settings that don't work on CI
          sed -i '/systemProp\.http\.proxy/d; /systemProp\.https\.proxy/d' gradle.properties
          echo "=== gradle.properties ==="
          cat gradle.properties

          # Download Gradle using curl (Java's HttpsURLConnection has connection issues on CI)
          GRADLE_VERSION=7.5
          curl -fSL -o /tmp/gradle.zip "https://mirrors.cloud.tencent.com/gradle/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -q /tmp/gradle.zip -d /tmp/
          export PATH="/tmp/gradle-${GRADLE_VERSION}/bin:$PATH"
          echo "/tmp/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH
          gradle --version

      - name: Build Debug APK
        run: |
          set -o pipefail
          export PATH="/tmp/gradle-7.5/bin:$PATH"
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Show Build Log
        if: always() && !cancelled()
        run: |
          echo "=== BUILD LOG (last 300 lines) ==="
          tail -300 build.log || true
          echo "=== ERROR SUMMARY ==="
          grep -in "error" build.log | head -50 || true

      - name: Debug APK location
        if: always() && !cancelled()
        run: |
          echo "=== Listing APK outputs ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found"
          echo "=== Listing build directory ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk directory"
          echo "=== Checking debug directory ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug directory"

      - name: Upload Build Log
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: radio-app-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "Debug Build v${{ github.run_number }}"
          body: "Auto-generated debug APK v${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
