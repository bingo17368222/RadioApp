name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.0'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log && if [ ${PIPESTATUS[0]} -ne 0 ]; then echo "=== BUILD FAILED ===" && tail -200 build.log; fi

      - name: Rename APK with version
        if: success()
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
          BUILD_NUM=${{ github.run_number }}
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/radio-app-v${VERSION}-${BUILD_NUM}.apk
          echo "APK: radio-app-v${VERSION}-${BUILD_NUM}.apk"

      - name: Upload to GitHub Release
        if: success() && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "Debug Build v${{ github.run_number }}"
          body: "Auto-generated debug APK v${{ github.run_number }} from commit ${{ github.sha }}"
          files: app/build/outputs/apk/debug/*.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
