name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Show Build Errors
        if: failure()
        run: |
          echo "=== BUILD LOG (last 200 lines) ==="
          tail -200 build.log || true
          echo "=== ERROR SUMMARY ==="
          grep -n "error:" build.log | head -30 || true

      - name: Verify APK
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" -type f -exec ls -la {} \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: radio-app-apk
          path: '**/*.apk'
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        run: |
          # 删除旧release
          gh release delete debug-latest --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/debug-latest 2>/dev/null || true
          # 创建新release并上传APK
          gh release create debug-latest --title "Debug Build v${{ github.run_number }}" --notes "Auto-generated debug APK v${{ github.run_number }}" --prerelease **/*.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
